name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (no live services needed) ─────────────────────────────────────
  unit:
    name: Backend — lint, type-check, unit tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      OPENAI_API_KEY: sk-test
      ELEVENLABS_API_KEY: el-test
      ELEVENLABS_VOICE_ID: voice-test
      SIMLI_API_KEY: simli-test
      SIMLI_FACE_ID: face-test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests ingestion

      - name: Type-check (mypy)
        run: mypy app --ignore-missing-imports

      - name: Unit tests with coverage
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  # ── Integration tests — real FastAPI app + WebSocket pipeline ────────────────
  # External boundaries (OpenAI, ElevenLabs, HeyGen, database) are mocked, so no
  # live services are needed: these exercise our own wiring, not third parties.
  integration:
    name: Backend — integration tests
    runs-on: ubuntu-latest
    needs: unit  # only run if unit tests pass

    permissions:
      contents: read

    # Placeholder config so Pydantic settings validate at import time. Nothing
    # here is dialled — every external call is mocked inside the tests.
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      OPENAI_API_KEY: sk-test
      ELEVENLABS_API_KEY: el-test
      ELEVENLABS_VOICE_ID: voice-test
      SIMLI_API_KEY: simli-test
      SIMLI_FACE_ID: face-test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Integration tests
        run: python -m pytest tests/integration/ -v --tb=short

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check, build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_SIMLI_FACE_ID: ci-placeholder
        run: npm run build
