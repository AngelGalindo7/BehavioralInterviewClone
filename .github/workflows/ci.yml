name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (no live services needed) ─────────────────────────────────────
  unit:
    name: Backend — lint, type-check, unit tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      OPENAI_API_KEY: sk-test
      ELEVENLABS_API_KEY: el-test
      ELEVENLABS_VOICE_ID: voice-test
      SIMLI_API_KEY: simli-test
      SIMLI_FACE_ID: face-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests ingestion

      - name: Type-check (mypy)
        run: mypy app --ignore-missing-imports

      - name: Unit tests with coverage
        run: |
          pytest tests/unit/ -v --tb=short \
            --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  # ── Integration tests (requires live pgvector Postgres) ──────────────────────
  integration:
    name: Backend — integration tests
    runs-on: ubuntu-latest
    needs: unit  # only run if unit tests pass

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      OPENAI_API_KEY: sk-test
      ELEVENLABS_API_KEY: el-test
      ELEVENLABS_VOICE_ID: voice-test
      SIMLI_API_KEY: simli-test
      SIMLI_FACE_ID: face-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Integration tests
        run: pytest tests/integration/ -v --tb=short

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_SIMLI_FACE_ID: ci-placeholder
        run: npm run build
