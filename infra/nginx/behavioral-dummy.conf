upstream uvicorn_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# DO NOT collapse the two server blocks back into a single listen-80 vhost.
# deploy.sh:65 overwrites the live config with this file on every deploy — if
# the 443 block is missing, HTTPS dies until certbot --nginx is re-run.

server {
    listen 80;
    listen [::]:80;
    server_name behavioraldummy.duckdns.org;

    # Keep ACME http-01 reachable so certbot renew (nginx authenticator) works
    # without manual intervention; everything else gets bounced to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name behavioraldummy.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/behavioraldummy.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/behavioraldummy.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static frontend (served directly by Nginx — no Python overhead) ────────
    location / {
        root /var/www/behavioral-dummy/frontend;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── WebSocket endpoint ─────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://uvicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;   # keep alive for full 60-min interview
        proxy_send_timeout  3600s;
        proxy_buffering     off;     # CRITICAL: must be off for streaming PCM
    }

    # ── REST API ───────────────────────────────────────────────────────────────
    # Trailing-slash regex: /admin/anecdotes and /auth/login go to the backend,
    # but bare /admin and /auth fall through to the SPA so the React router
    # can render AdminPage / LoginGate without hitting a 404 from FastAPI.
    location ~ ^/(session|avatar|auth|admin)/ {
        proxy_pass http://uvicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location ~ ^/(health|ready)$ {
        proxy_pass http://uvicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ── Grafana (restrict to trusted IPs in production) ───────────────────────
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Uncomment to restrict access:
        # allow 1.2.3.4;
        # deny  all;
    }
}
