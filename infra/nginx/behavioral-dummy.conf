upstream uvicorn_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP-only pre-certbot config.
# Run: sudo certbot --nginx -d your-domain.com
# Certbot will add the port 443 SSL block and convert this to an HTTPS redirect.
server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    # ── Static frontend (served directly by Nginx — no Python overhead) ────────
    location / {
        root /var/www/behavioral-dummy/frontend;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── WebSocket endpoint ─────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://uvicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout  3600s;   # keep alive for full 60-min interview
        proxy_send_timeout  3600s;
        proxy_buffering     off;     # CRITICAL: must be off for streaming PCM
    }

    # ── REST API ───────────────────────────────────────────────────────────────
    # Trailing-slash regex: /admin/anecdotes and /auth/login go to the backend,
    # but bare /admin and /auth fall through to the SPA so the React router
    # can render AdminPage / LoginGate without hitting a 404 from FastAPI.
    location ~ ^/(session|simli|auth|admin)/ {
        proxy_pass http://uvicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }
    location ~ ^/(health|ready)$ {
        proxy_pass http://uvicorn_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # ── Grafana (restrict to trusted IPs in production) ───────────────────────
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Uncomment to restrict access:
        # allow 1.2.3.4;
        # deny  all;
    }
}
