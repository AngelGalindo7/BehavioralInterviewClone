<svg viewBox="190 48 1466 811" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="System architecture diagram: hub and spoke with FastAPI Backend at the center." style="background:#F5F5F5;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <defs>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#555555"/>
    </marker>
    <marker id="arrow-start" markerUnits="userSpaceOnUse" markerWidth="10" markerHeight="10" refX="0.5" refY="5" orient="auto">
      <path d="M9,0 L0,5 L9,10 z" fill="#555555"/>
    </marker>
    <style>
      .node-label { font-size: 17px; font-weight: 500; fill: #000000; }
      .browser-tag { font-size: 10px; font-weight: 600; letter-spacing: 1.6px; fill: #64748B; }
      .edge-label {
        font-size: 13px; font-weight: 500; fill: #333333;
        paint-order: stroke; stroke: #F5F5F5; stroke-width: 3px; stroke-linejoin: round;
      }
      .edge { fill: none; stroke: #555555; stroke-width: 1; }
    </style>
  </defs>

  <!-- EDGES -->
  <path id="e1" class="edge" d="M456,450 L702,450" marker-end="url(#arrow)"/>
  <path id="e2" class="edge" d="M800,411 L800,198" marker-end="url(#arrow)" marker-start="url(#arrow-start)"/>
  <path id="e3" class="edge" d="M556,715 L744,488" marker-end="url(#arrow)"/>
  <path id="e4" class="edge" d="M785,488 L785,709" marker-end="url(#arrow)"/>
  <path id="e5" class="edge" d="M815,715 L815,494" marker-end="url(#arrow)"/>
  <path id="e6" class="edge" d="M892,450 L1052,450" marker-end="url(#arrow)"/>
  <path id="e7" class="edge" d="M1254,450 L1412,450" marker-end="url(#arrow)"/>

  <!-- EDGE LABELS -->
  <text class="edge-label" x="579" y="440" text-anchor="middle">interview question</text>
  <text class="edge-label" x="814" y="308" text-anchor="start">prompt / token stream</text>
  <text class="edge-label" x="648" y="588" text-anchor="end">injects into system prompt</text>
  <text class="edge-label" x="775" y="602" text-anchor="end">live sentence chunks</text>
  <text class="edge-label" x="825" y="602" text-anchor="start">PCM audio</text>
  <text class="edge-label" x="972" y="440" text-anchor="middle">PCM audio</text>
  <text class="edge-label" x="1333" y="440" text-anchor="middle">LiveKit stream</text>

  <!-- NODES -->
  <text class="browser-tag" x="368" y="406" text-anchor="middle">BROWSER</text>
  <rect x="280" y="423" width="176" height="54" rx="6" fill="#FFFFFF" stroke="#64748B" stroke-width="1.5"/>
  <text class="node-label" x="368" y="450" text-anchor="middle" dominant-baseline="middle">Web Speech API</text>

  <rect x="716" y="138" width="168" height="54" rx="6" fill="#FFFFFF" stroke="#9886ED" stroke-width="1.5"/>
  <text class="node-label" x="800" y="165" text-anchor="middle" dominant-baseline="middle">GPT-4o-mini</text>

  <rect x="708" y="412" width="184" height="76" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1.5"/>
  <text class="node-label" x="800" y="443" text-anchor="middle" dominant-baseline="middle" font-weight="600">FastAPI Backend</text>
  <text x="800" y="464" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="#64748B">EC2</text>

  <rect x="478" y="715" width="156" height="54" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1.5"/>
  <text class="node-label" x="556" y="742" text-anchor="middle" dominant-baseline="middle">Your Stories</text>

  <rect x="712" y="715" width="176" height="54" rx="6" fill="#FFFFFF" stroke="#00B481" stroke-width="1.5"/>
  <text class="node-label" x="800" y="742" text-anchor="middle" dominant-baseline="middle">ElevenLabs TTS</text>

  <rect x="1058" y="423" width="196" height="54" rx="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5"/>
  <text class="node-label" x="1156" y="450" text-anchor="middle" dominant-baseline="middle">HeyGen LiveAvatar</text>

  <text class="browser-tag" x="1492" y="406" text-anchor="middle">BROWSER</text>
  <rect x="1418" y="423" width="148" height="54" rx="6" fill="#FFFFFF" stroke="#64748B" stroke-width="1.5"/>
  <text class="node-label" x="1492" y="450" text-anchor="middle" dominant-baseline="middle">Browser</text>
</svg>
