<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BehavioralDummy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #111114;
        --surface-2: #16161a;
        --border: rgba(255, 255, 255, 0.07);
        --border-strong: rgba(255, 255, 255, 0.13);
        --text: #ededed;
        --text-dim: #a1a1a6;
        --text-muted: #6b6b70;
        --accent: #4ade80;
        --accent-soft: rgba(74, 222, 128, 0.14);
        --danger: #e5484d;
        --danger-soft: rgba(229, 72, 77, 0.10);
        --warn: #f5a524;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root { min-height: 100%; }

      body {
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        letter-spacing: -0.005em;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::selection { background: rgba(255, 255, 255, 0.18); }

      a {
        color: var(--text-dim);
        text-decoration: none;
        transition: color 0.15s ease;
      }
      a:hover { color: var(--text); }

      h1, h2, h3 {
        font-weight: 600;
        letter-spacing: -0.015em;
      }

      button { font-family: inherit; }

      .surface {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 8px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        font-size: 13.5px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease,
          opacity 0.15s ease;
        white-space: nowrap;
      }
      .btn:focus-visible {
        outline: 2px solid var(--text);
        outline-offset: 2px;
      }
      .btn:disabled { cursor: not-allowed; opacity: 0.45; }

      .btn-primary {
        background: #fff;
        color: #0a0a0b;
        border-color: #fff;
      }
      .btn-primary:not(:disabled):hover {
        background: #e8e8ea;
        border-color: #e8e8ea;
      }

      .btn-danger {
        background: var(--danger);
        color: #fff;
        border-color: var(--danger);
      }
      .btn-danger:not(:disabled):hover {
        background: #d23a3f;
        border-color: #d23a3f;
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-dim);
        border-color: var(--border);
      }
      .btn-ghost:not(:disabled):hover {
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-color: var(--border-strong);
      }

      .btn-danger-ghost {
        background: transparent;
        color: #f87171;
        border-color: rgba(229, 72, 77, 0.30);
      }
      .btn-danger-ghost:not(:disabled):hover {
        background: rgba(229, 72, 77, 0.08);
        color: #fca5a5;
        border-color: rgba(229, 72, 77, 0.55);
      }

      .input {
        width: 100%;
        padding: 9px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.15s ease, background 0.15s ease;
      }
      .input::placeholder { color: var(--text-muted); }
      .input:focus {
        outline: none;
        border-color: var(--border-strong);
        background: var(--surface-2);
      }
      .input:disabled { opacity: 0.6; cursor: not-allowed; }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 9px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-dim);
      }

      .label {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-dim);
        letter-spacing: 0.01em;
      }

      .muted { color: var(--text-muted); }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(2px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .pulse-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
      .fade-in { animation: fade-in 0.25s ease both; }
      .spinner {
        width: 18px; height: 18px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.10);
        border-top-color: var(--text);
        animation: spin 0.7s linear infinite;
      }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.07);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.14);
        background-clip: padding-box;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
